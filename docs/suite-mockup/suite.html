<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Broadcast Suite — UI Mockup</title>
<style>
  :root{
    --bg:#0b0e14; --s1:#10141d; --s2:#151a26; --s3:#1a2130; --s4:#212a3d;
    --border:#2a3346; --border-m:#1f2736;
    --text:#e7eaf2; --text2:#a6b0c3; --muted:#6e7a90; --faint:#4c576c;
    --accent:#3b82f6;
    --raum:#94a3b8; --cam:#38bdf8; --lit:#f5a623; --sig:#a78bfa;
    --ok:#34d399; --warn:#fbbf24; --danger:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,-apple-system,'Segoe UI',Roboto,sans-serif}
  html,body{width:1600px;height:1000px;overflow:hidden;background:var(--bg);color:var(--text)}
  .app{display:grid;grid-template-rows:42px 1fr 27px;height:100%}

  /* ── MenuBar ── */
  .menubar{display:flex;align-items:center;gap:4px;background:var(--s2);border-bottom:1px solid var(--border);padding:0 10px;font-size:12.5px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:650;letter-spacing:.2px;margin-right:6px}
  .brand .logo{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--cam),var(--lit) 55%,var(--sig));box-shadow:0 0 0 1px #ffffff18 inset}
  .menu{padding:5px 9px;border-radius:6px;color:var(--text2)}
  .menu:hover{background:var(--s3)}
  .proj{margin-left:10px;color:var(--muted);font-size:12px}
  .proj b{color:var(--text2);font-weight:550}
  .mb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .pill{display:flex;align-items:center;gap:7px;background:var(--s3);border:1px solid var(--border);border-radius:7px;padding:4px 10px;color:var(--muted);font-size:12px;min-width:210px}
  .kbd{background:var(--s4);border:1px solid var(--border);border-radius:4px;padding:0 5px;font-size:10.5px;color:var(--text2)}
  .iconbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text2)}
  .iconbtn:hover{background:var(--s3)}
  .avatar-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ok)}

  /* ── Main grid ── */
  .main{display:grid;grid-template-columns:60px 270px 1fr 322px;min-height:0}

  /* ── Mode rail ── */
  .rail{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px}
  .mode{width:48px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:9px;color:var(--muted);font-size:9.5px;font-weight:550;position:relative;letter-spacing:.2px}
  .mode svg{width:19px;height:19px}
  .mode.active{color:var(--text);background:var(--s3)}
  .mode.active::before{content:'';position:absolute;left:-6px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--mc)}
  .mode.active svg{color:var(--mc)}
  .mode .num{position:absolute;top:3px;right:5px;font-size:8px;color:var(--faint)}
  .rail .sep{width:30px;height:1px;background:var(--border);margin:7px 0}
  .rail .spacer{flex:1}

  /* ── Left dock ── */
  .dock{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .dock-tabs{display:flex;gap:2px;padding:8px 10px 0}
  .dock-tab{padding:5px 10px;font-size:11.5px;color:var(--muted);border-radius:6px 6px 0 0}
  .dock-tab.active{background:var(--s2);color:var(--text);border:1px solid var(--border);border-bottom-color:var(--s2)}
  .dock-body{background:var(--s2);border-top:1px solid var(--border);margin-top:-1px;flex:1;display:flex;flex-direction:column;min-height:0}
  .search{margin:10px 10px 6px;display:flex;align-items:center;gap:7px;background:var(--s3);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--muted);font-size:12px}
  .lib-cat{padding:7px 12px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600}
  .lib-item{display:flex;align-items:center;gap:9px;padding:6px 12px;font-size:12.5px;color:var(--text2)}
  .lib-item:hover{background:var(--s3)}
  .lib-item .sw{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--s4);flex:none}
  .lib-item .sub{font-size:10.5px;color:var(--muted);margin-top:1px}
  .lib-item .star{margin-left:auto;color:var(--warn);font-size:11px}
  .lib-item.sel{background:color-mix(in srgb,var(--mc) 14%,transparent);outline:1px solid color-mix(in srgb,var(--mc) 45%,transparent)}

  /* Layers */
  .layers{border-top:1px solid var(--border);padding-bottom:6px}
  .layers h4{display:flex;align-items:center;gap:7px;padding:9px 12px 5px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint)}
  .lrow{display:flex;align-items:center;gap:8px;padding:4.5px 12px;font-size:12px;color:var(--text2)}
  .lrow .dot{width:8px;height:8px;border-radius:3px;flex:none}
  .lrow .cnt{margin-left:auto;color:var(--faint);font-size:10.5px}
  .lrow .ic{color:var(--muted);width:14px;height:14px;margin-left:7px}
  .lrow.dim{opacity:.55}
  .lrow .opa{width:56px;height:3px;border-radius:2px;background:var(--s4);position:relative;margin-left:8px}
  .lrow .opa i{position:absolute;left:0;top:0;bottom:0;border-radius:2px;background:var(--muted)}

  /* ── Workspace ── */
  .work{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg)}
  .tabs{display:flex;align-items:center;gap:2px;background:var(--s1);border-bottom:1px solid var(--border);padding:5px 10px 0}
  .tab{display:flex;align-items:center;gap:7px;padding:6px 13px;font-size:12px;color:var(--muted);border-radius:7px 7px 0 0;border:1px solid transparent}
  .tab.active{background:var(--bg);color:var(--text);border-color:var(--border);border-bottom-color:var(--bg)}
  .tab .tdot{width:6px;height:6px;border-radius:50%}
  .tabs .right{margin-left:auto;display:flex;gap:6px;align-items:center;padding-bottom:5px}
  .layoutbtn{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:3.5px 9px;display:flex;gap:6px;align-items:center}
  .canvas-wrap{position:relative;flex:1;min-height:0;overflow:hidden}
  .canvas-wrap svg.scene{position:absolute;inset:0;width:100%;height:100%}

  /* Toolbar overlay */
  .toolbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:3px;background:color-mix(in srgb,var(--s2) 92%,transparent);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:0 6px 24px #0009;backdrop-filter:blur(6px)}
  .tb{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--text2)}
  .tb svg{width:16px;height:16px}
  .tb:hover{background:var(--s3)}
  .tb.on{background:color-mix(in srgb,var(--mc) 20%,transparent);color:var(--mc)}
  .tb.wide{width:auto;padding:0 10px;font-size:11.5px;gap:6px;white-space:nowrap}
  .tbsep{width:1px;height:18px;background:var(--border);margin:0 4px}
  .tb .tglyph{font-size:13px}

  /* floating hint chip */
  .chip{position:absolute;display:flex;gap:7px;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text2);box-shadow:0 4px 16px #0008}
  .chip b{color:var(--text);font-weight:600}

  /* ── Properties ── */
  .props{background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .props-head{padding:12px 14px 9px;border-bottom:1px solid var(--border)}
  .props-head .kind{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--mc);font-weight:650;display:flex;align-items:center;gap:6px}
  .props-head h3{font-size:14.5px;font-weight:600;margin-top:3px}
  .props-head .sub{font-size:11px;color:var(--muted);margin-top:1px}
  .sec{border-bottom:1px solid var(--border-m);padding:9px 14px 11px}
  .sec h5{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--faint);font-weight:650;margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .frow{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text2)}
  .frow label{width:64px;flex:none;color:var(--muted);font-size:11.5px}
  .inp{flex:1;background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:4.5px 8px;font-size:12px;color:var(--text)}
  .inp.small{max-width:60px}
  .unit{color:var(--faint);font-size:10.5px;margin-left:-2px}
  .slider{flex:1;height:4px;border-radius:3px;background:var(--s4);position:relative}
  .slider i{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:var(--mc)}
  .slider u{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--text);box-shadow:0 1px 4px #000a}
  .val{width:52px;text-align:right;color:var(--text);font-size:12px;flex:none}
  .gels{display:flex;gap:6px}
  .gel{width:26px;height:26px;border-radius:6px;border:1px solid #ffffff22;display:flex;align-items:center;justify-content:center;font-size:8.5px;color:#0009;font-weight:700}
  .xsec{background:color-mix(in srgb,var(--xc) 8%,transparent);border-left:2px solid var(--xc)}
  .xsec h5{color:var(--xc)}
  .linkbtn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--xc);border:1px solid color-mix(in srgb,var(--xc) 40%,transparent);padding:4px 9px;border-radius:6px;margin-top:2px}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}

  /* ── StatusBar ── */
  .status{display:flex;align-items:center;gap:14px;background:var(--s2);border-top:1px solid var(--border);padding:0 12px;font-size:11px;color:var(--muted)}
  .status b{color:var(--text2);font-weight:550}
  .status .sp{flex:1}
  .status .warnc{color:var(--warn)}
  .status .okc{color:var(--ok)}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- MenuBar -->
  <div class="menubar">
    <div class="brand"><div class="logo"></div>Broadcast&nbsp;Suite</div>
    <div class="menu">Datei</div><div class="menu">Bearbeiten</div><div class="menu">Ansicht</div>
    <div class="menu">Einfügen</div><div class="menu">Dokumente&nbsp;&amp;&nbsp;Export</div><div class="menu">Hilfe</div>
    <div class="proj">— <b>Sommershow 2026 · Halle A</b> <span style="color:var(--faint)">· v12 · gespeichert</span></div>
    <div class="mb-right">
      <div class="iconbtn" title="Rückgängig"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-4"/></svg></div>
      <div class="iconbtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h4"/></svg></div>
      <div class="pill"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>Suchen &amp; Befehle<span style="flex:1"></span><span class="kbd">⌘K</span></div>
      <div class="avatar-sync"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Autosave</div>
      <div class="iconbtn"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v3m0 16v3M4.2 4.2l2.1 2.1m11.4 11.4 2.1 2.1M1 12h3m16 0h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg></div>
    </div>
  </div>

  <div class="main">
    <!-- Mode rail -->
    <div class="rail" id="rail"></div>
    <!-- Left dock -->
    <div class="dock" id="dock"></div>
    <!-- Workspace -->
    <div class="work">
      <div class="tabs" id="tabs"></div>
      <div class="canvas-wrap" id="canvas"></div>
    </div>
    <!-- Properties -->
    <div class="props" id="props"></div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const mode = new URLSearchParams(location.search).get('mode') || 'licht';
const MC = {raum:'var(--raum)', kameras:'var(--cam)', licht:'var(--lit)', signal:'var(--sig)'}[mode];
document.getElementById('app').style.setProperty('--mc', MC);

const I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1Z"/></svg>',
  cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 10 5-3v10l-5-3"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>',
  bulb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2Z"/></svg>',
  plug:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v6m6-6v6M7 8h10v4a5 5 0 0 1-5 5v0a5 5 0 0 1-5-5V8Zm5 9v5"/></svg>',
  cursor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m4 4 7 17 2.5-7.5L21 11z"/></svg>',
  hand:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6.5a1.5 1.5 0 0 0-3 0V11m0-5.5v-2a1.5 1.5 0 0 0-3 0V11m0-7.5a1.5 1.5 0 0 0-3 0V12m9-1v2a8 8 0 0 1-8 8h-.5A7.5 7.5 0 0 1 4 13.5V9a1.5 1.5 0 0 1 3 0"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>',
  aim:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>',
  ruler:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17 17 3l4 4L7 21zM8 12l1.5 1.5M11 9l1.5 1.5M14 6l1.5 1.5"/></svg>',
  wall:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M3 15h18M9 3v6m6 6v6M3 3h18v18H3z"/></svg>',
  person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>',
  grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c4 0 7-2.7 7-7 0-3-1.5-5.5-3.5-7.5C14 6 13 4 13 2c-3 2-5 4-5 7l1.5 1.5C8 11 6 12.5 6 15.5 6 19.5 8.5 22 12 22Z"/></svg>',
  node:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="8" height="6" rx="1.5"/><rect x="14" y="14" width="8" height="6" rx="1.5"/><path d="M10 7h4a3 3 0 0 1 3 3v4"/></svg>',
  cable:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9a2 2 0 0 1 2-2h2v10H6a2 2 0 0 1-2-2Zm12-2h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2zM8 12h8"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 2 9 5-9 5-9-5 9-5Zm-9 10 9 5 9-5M3 17l9 5 9-5"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15A2.5 2.5 0 0 0 6.5 22H20v-2.5"/></svg>',
  wand:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 4 5 5L8 21l-5 1 1-5L15 4Zm-2 2 5 5M19 2l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
};

/* ── Mode rail ── */
const modes = [
  {id:'raum', label:'Raum', icon:I.home, key:'1'},
  {id:'kameras', label:'Kameras', icon:I.cam, key:'2'},
  {id:'licht', label:'Licht', icon:I.bulb, key:'3'},
  {id:'signal', label:'Signal', icon:I.plug, key:'4'},
];
document.getElementById('rail').innerHTML =
  modes.map(m=>`<div class="mode ${m.id===mode?'active':''}" style="--mc:${({raum:'var(--raum)',kameras:'var(--cam)',licht:'var(--lit)',signal:'var(--sig)'})[m.id]}">
    <span class="num">${m.key}</span>${m.icon}<span>${m.label}</span></div>`).join('')
  +`<div class="sep"></div>
  <div class="mode">${I.layers}<span>Ebenen</span></div>
  <div class="mode">${I.book}<span>Bibliothek</span></div>
  <div class="spacer"></div>
  <div class="mode" style="height:44px">${I.grid}<span>Module</span></div>`;

/* ── Library (per mode) ── */
const LIBS = {
  licht:{tabs:['Fixtures','Gels','Presets'],cats:[
    {cat:'Profiler',items:[
      {n:'ETC Source Four 19°',s:'750 W · 19° · 3200 K',c:'#f5a623',fav:1,sel:1},
      {n:'ETC Source Four 36°',s:'750 W · 36° · 3200 K',c:'#f5a623',fav:1},
      {n:'KL Profile FC',s:'260 W LED · 5°–50°',c:'#fbbf24'}]},
    {cat:'Wash / Fresnel',items:[
      {n:'KL Fresnel 8 FC',s:'300 W LED · 15°–60°',c:'#fde68a',fav:1},
      {n:'Arri 650 Plus',s:'650 W · Fresnel',c:'#fde68a'}]},
    {cat:'PAR / Panel',items:[
      {n:'KL Panel XL',s:'400 W LED · Softlight',c:'#fef3c7'},
      {n:'PAR 64 CP62',s:'1000 W · MFL',c:'#f59e0b'}]}]},
  kameras:{tabs:['Kameras','Objektive','Templates'],cats:[
    {cat:'Cinema',items:[
      {n:'Sony FX9',s:'FF 6K · E-Mount',c:'#38bdf8',fav:1,sel:1},
      {n:'Sony VENICE 2',s:'FF 8.6K · PL/E',c:'#38bdf8',fav:1},
      {n:'Canon C500 II',s:'FF 5.9K · EF/PL',c:'#7dd3fc'}]},
    {cat:'Broadcast',items:[
      {n:'URSA Broadcast G2',s:'B4 · 2/3&quot;-Relay',c:'#7dd3fc'},
      {n:'Sony HDC-3500',s:'2/3&quot; · B4',c:'#bae6fd'}]},
    {cat:'PTZ',items:[{n:'Sony FR7',s:'FF PTZ · E-Mount',c:'#a5f3fc'}]}]},
  signal:{tabs:['Equipment','Kabel','Racks'],cats:[
    {cat:'Bildmischer / Router',items:[
      {n:'ATEM Constellation 8K',s:'40× 12G-SDI In',c:'#a78bfa',fav:1,sel:1},
      {n:'Videohub 40×40',s:'12G-SDI Router',c:'#c4b5fd'}]},
    {cat:'Kameras (aus 📷)',items:[
      {n:'CAM 1 — Sony FX9',s:'3× SDI Out · verknüpft',c:'#38bdf8'},
      {n:'CAM 2 — Sony FX9',s:'3× SDI Out · verknüpft',c:'#38bdf8'}]},
    {cat:'Dimmer / Power (aus 💡)',items:[
      {n:'Dimmer Rack 2',s:'12 Kanäle · 16 A · verknüpft',c:'#f5a623'}]}]},
};
const lib = LIBS[mode] || LIBS.licht;
document.getElementById('dock').innerHTML = `
  <div class="dock-tabs">${lib.tabs.map((t,i)=>`<div class="dock-tab ${i===0?'active':''}">${t}</div>`).join('')}</div>
  <div class="dock-body">

/* ── Scene: 2D venue (licht / kameras) ── */
function venueScene(){
  const dimCam = mode==='licht'?0.38:1, dimLit = mode==='kameras'?0.35:1;
  // world: 24m x 14m → scale 46 px/m, offset
  const S=46, OX=90, OY=70;
  const X=m=>OX+m*S, Y=m=>OY+m*S;
  let g='';
  // grid
  for(let m=0;m<=24;m++) g+=`<line x1="${X(m)}" y1="${Y(0)}" x2="${X(m)}" y2="${Y(14)}" stroke="#1a2130" stroke-width="${m%5?1:1.5}"/>`;
  for(let m=0;m<=14;m++) g+=`<line x1="${X(0)}" y1="${Y(m)}" x2="${X(24)}" y2="${Y(m)}" stroke="#1a2130" stroke-width="${m%5?1:1.5}"/>`;
  // rulers
  let rul='';
  for(let m=0;m<=24;m+=2) rul+=`<text x="${X(m)}" y="${OY-12}" fill="#4c576c" font-size="9" text-anchor="middle">${m}m</text>`;
  for(let m=0;m<=14;m+=2) rul+=`<text x="${OX-14}" y="${Y(m)+3}" fill="#4c576c" font-size="9" text-anchor="end">${m}</text>`;
  // floor plan hint (architectural)
  const fp=`<g opacity="0.16" stroke="#b9c3d8" fill="none" stroke-width="1.2">
    <rect x="${X(0.6)}" y="${Y(0.6)}" width="${22.8*S}" height="${12.8*S}"/>
    <path d="M${X(6)} ${Y(0.6)} V${Y(3.4)} M${X(6)} ${Y(0.6)} V${Y(3.4)} M${X(18)} ${Y(0.6)} V${Y(3.4)}"/>
    <path d="M${X(0.6)} ${Y(9)} H${X(4)} M${X(20)} ${Y(9)} H${X(23.4)}"/>
    <circle cx="${X(21.5)}" cy="${Y(11.5)}" r="${1.1*S}"/><path d="M${X(2)} ${Y(11)} l${1.4*S} 0 M${X(2.7)} ${Y(10.3)} l0 ${1.4*S}"/>
  </g>`;
  // venue walls
  const walls=`<g stroke="#8fa0bd" stroke-width="3" stroke-linecap="round">
    <line x1="${X(1)}" y1="${Y(1)}" x2="${X(23)}" y2="${Y(1)}"/>
    <line x1="${X(1)}" y1="${Y(1)}" x2="${X(1)}" y2="${Y(13)}"/>
    <line x1="${X(23)}" y1="${Y(1)}" x2="${X(23)}" y2="${Y(13)}"/>
    <line x1="${X(1)}" y1="${Y(13)}" x2="${X(9.5)}" y2="${Y(13)}"/><line x1="${X(14.5)}" y1="${Y(13)}" x2="${X(23)}" y2="${Y(13)}"/>
  </g><text x="${X(12)}" y="${Y(13.35)}" fill="#6e7a90" font-size="9.5" text-anchor="middle">Tor / Einlass</text>`;
  // stage
  const stage=`<rect x="${X(8)}" y="${Y(1.6)}" width="${8*S}" height="${3.2*S}" rx="4" fill="#2a2417" stroke="#f5a62355" stroke-width="1.5"/>
    <text x="${X(12)}" y="${Y(3.3)}" fill="#c9a35c" font-size="11" text-anchor="middle" font-weight="600">Bühne 8×3.2 m</text>`;
  // truss
  const truss=`<line x1="${X(7.2)}" y1="${Y(5.6)}" x2="${X(16.8)}" y2="${Y(5.6)}" stroke="#55617a" stroke-width="6" stroke-linecap="round" opacity="${dimLit}"/>
    <text x="${X(7.2)}" y="${Y(5.6)-9}" fill="#7c8aa5" font-size="9.5" opacity="${dimLit}">Truss 1 · h 6.0 m · 84 kg / 150 kg</text>`;
  // persons
  const persons=[[11,2.9,'Host'],[13.2,2.7,'Gast'],[12,8.6,'FOH']].map(([x,y,l])=>`
    <g><circle cx="${X(x)}" cy="${Y(y)}" r="8" fill="#fb923c33" stroke="#fb923c" stroke-width="1.6"/>
    <line x1="${X(x)}" y1="${Y(y)}" x2="${X(x)}" y2="${Y(y)+14}" stroke="#fb923c" stroke-width="1.6"/>
    <text x="${X(x)}" y="${Y(y)-13}" fill="#fdba74" font-size="9.5" text-anchor="middle">${l}</text></g>`).join('');
  // fixtures on truss
  const fixData=[[8,'S4 19°',0],[9.6,'S4 19°',0],[11.2,'S4 26°',1],[12.8,'Fresnel',0],[14.4,'S4 19°',0],[16,'KL Panel',0]];
  let fixtures=`<g opacity="${dimLit}">`;
  fixData.forEach(([fx,label,sel])=>{
    const ax=X(fx*0.35+7.5), tgt={x:X(11+(fx-11)*0.35),y:Y(2.9)};
    const px=X(fx), py=Y(5.6);
    // beam
    fixtures+=`<path d="M${px} ${py} L${tgt.x-26} ${tgt.y+6} L${tgt.x+26} ${tgt.y+6} Z" fill="url(#beam)" opacity="${sel?0.5:0.28}"/>`;
    fixtures+=`<line x1="${px}" y1="${py}" x2="${tgt.x}" y2="${tgt.y}" stroke="#f5a623" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>`;
    fixtures+=`<rect x="${px-7}" y="${py-7}" width="14" height="14" rx="2.5" transform="rotate(45 ${px} ${py})" fill="${sel?'#f5a623':'#b97f17'}" stroke="${sel?'#fff':'#0b0e14'}" stroke-width="${sel?2:1.2}"/>`;
    if(sel){
      fixtures+=`<circle cx="${tgt.x}" cy="${tgt.y}" r="6" fill="#34d399" stroke="#0b0e14" stroke-width="1.5"/>
      <text x="${tgt.x+11}" y="${tgt.y+3}" fill="#6ee7b7" font-size="9">Aim</text>
      <rect x="${px-13}" y="${py-13}" width="26" height="26" fill="none" stroke="#f5a623" stroke-width="1" stroke-dasharray="3 3"/>`;
      fixtures+=`<text x="${px}" y="${py+26}" fill="#fbd38d" font-size="9.5" text-anchor="middle" font-weight="600">LX 3 · ${label}</text>`;
    }
  });
  fixtures+='</g>';
  // heatmap (licht mode only)
  let heat='';
  if(mode==='licht'){
    heat=`<ellipse cx="${X(12)}" cy="${Y(3)}" rx="${4.4*S}" ry="${1.9*S}" fill="url(#heatc)" opacity="0.5"/>
    <ellipse cx="${X(12)}" cy="${Y(3)}" rx="${2.6*S}" ry="${1.1*S}" fill="url(#heath)" opacity="0.55"/>`;
  }
  // cameras
  const camData=[[4.2,10.8,52,'CAM 1 · 24mm',34],[12,11.6,90,'CAM 2 · 85mm',12],[19.8,10.8,128,'CAM 3 · 70-200',10],[3,4.2,-18,'CAM 4 · PTZ',28]];
  let cams=`<g opacity="${dimCam}">`;
  camData.forEach(([mx,my,pan,label,fov])=>{
    const px=X(mx),py=Y(my),r=pan*Math.PI/180;
    const len=3.6*S, a=fov*Math.PI/360;
    const p1=[px+Math.cos(r-a)*len,py-Math.sin(r-a)*len], p2=[px+Math.cos(r+a)*len,py-Math.sin(r+a)*len];
    cams+=`<path d="M${px} ${py} L${p1[0]} ${p1[1]} L${p2[0]} ${p2[1]} Z" fill="#38bdf8" opacity="0.10" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1"/>`;
    cams+=`<rect x="${px-9}" y="${py-6.5}" width="18" height="13" rx="2.5" fill="#0e3a52" stroke="#38bdf8" stroke-width="1.6" transform="rotate(${-pan} ${px} ${py})"/>`;
    cams+=`<text x="${px}" y="${py+22}" fill="#7dd3fc" font-size="9.5" text-anchor="middle">${label}</text>`;
  });
  cams+='</g>';
  const defs=`<defs>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5a623" stop-opacity="0.02"/><stop offset="1" stop-color="#f5a623" stop-opacity="0.55"/></linearGradient>
    <radialGradient id="heatc"><stop offset="0" stop-color="#22c55e" stop-opacity=".55"/><stop offset=".7" stop-color="#eab308" stop-opacity=".3"/><stop offset="1" stop-color="#ef4444" stop-opacity=".12"/></radialGradient>
    <radialGradient id="heath"><stop offset="0" stop-color="#60d394" stop-opacity=".8"/><stop offset="1" stop-color="#60d394" stop-opacity="0"/></radialGradient>
  </defs>`;
  return `<svg class="scene" viewBox="0 0 1250 760">${defs}
    <rect width="1250" height="760" fill="#0c0f16"/>
    ${g}${rul}${fp}${stage}${walls}${heat}${truss}${persons}${mode==='licht'?cams+fixtures:fixtures+cams}
  </svg>`;
}

/* ── Scene: signal-flow graph ── */
function signalScene(){
  const node=(x,y,w,title,color,ins,outs,extra='')=>{
    let h=34+Math.max(ins.length,outs.length)*19+10;
    let s=`<g transform="translate(${x},${y})">
      <rect width="${w}" height="${h}" rx="9" fill="#151a26" stroke="#2a3346" stroke-width="1.2"/>
      <rect width="${w}" height="26" rx="9" fill="${color}22"/><rect y="18" width="${w}" height="8" fill="#151a26"/>
      <circle cx="14" cy="13" r="4" fill="${color}"/>
      <text x="26" y="17" fill="#e7eaf2" font-size="11.5" font-weight="600">${title}</text>${extra}`;
    ins.forEach((p,i)=>{s+=`<circle cx="0" cy="${40+i*19}" r="4.5" fill="#0b0e14" stroke="${p[1]||'#4ade80'}" stroke-width="2"/><text x="10" y="${43.5+i*19}" fill="#a6b0c3" font-size="10">${p[0]}</text>`;});
    outs.forEach((p,i)=>{s+=`<circle cx="${w}" cy="${40+i*19}" r="4.5" fill="#0b0e14" stroke="${p[1]||'#4ade80'}" stroke-width="2"/><text x="${w-10}" y="${43.5+i*19}" fill="#a6b0c3" font-size="10" text-anchor="end">${p[0]}</text>`;});
    return s+'</g>';
  };
  const wire=(x1,y1,x2,y2,c,label,sel)=>{
    const mx=(x1+x2)/2;
    return `<path d="M${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" fill="none" stroke="${c}" stroke-width="${sel?2.6:1.8}" opacity="${sel?1:.8}" ${sel?'stroke-dasharray="none" filter="url(#glow)"':''}/>`+
      (label?`<g><rect x="${mx-38}" y="${(y1+y2)/2-9}" width="76" height="15" rx="7" fill="#0b0e14" stroke="${sel?c:'#2a3346'}" stroke-width="1"/><text x="${mx}" y="${(y1+y2)/2+2.5}" fill="${sel?c:'#a6b0c3'}" font-size="9" text-anchor="middle">${label}</text></g>`:'');
  };
  const V='#4ade80', A='#f87171', N='#60a5fa', P='#f5a623';
  const camBadge=`<g transform="translate(214,7)"><rect width="34" height="13" rx="6" fill="#38bdf822" stroke="#38bdf866" stroke-width="0.8"/><text x="17" y="9.5" fill="#7dd3fc" font-size="7.5" text-anchor="middle">VENUE</text></g>`;
  const litBadge=`<g transform="translate(214,7)"><rect width="34" height="13" rx="6" fill="#f5a62322" stroke="#f5a62366" stroke-width="0.8"/><text x="17" y="9.5" fill="#fbd38d" font-size="7.5" text-anchor="middle">VENUE</text></g>`;
  return `<svg class="scene" viewBox="0 0 1250 760">
    <defs><filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4ade80" flood-opacity="0.6"/></filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1c2333"/></pattern></defs>
    <rect width="1250" height="760" fill="#0c0f16"/><rect width="1250" height="760" fill="url(#dots)"/>
    <rect x="40" y="60" width="330" height="560" rx="12" fill="none" stroke="#3b82f644" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="56" y="84" fill="#3b82f6" font-size="11" font-weight="600">BÜHNE / FLOOR</text>
    <rect x="740" y="60" width="470" height="400" rx="12" fill="none" stroke="#a78bfa44" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="756" y="84" fill="#a78bfa" font-size="11" font-weight="600">REGIE / OB</text>
    ${node(70,110,260,'CAM 1 — Sony FX9','#38bdf8',[['Ref In',V],['TC In',V]],[['SDI Out 1 (12G)',V],['SDI Out 2',V],['Ethernet',N]],camBadge)}
    ${node(70,270,260,'CAM 2 — Sony FX9','#38bdf8',[['Ref In',V],['TC In',V]],[['SDI Out 1 (12G)',V],['SDI Out 2',V],['Ethernet',N]],camBadge)}
    ${node(70,430,260,'Dimmer Rack 2','#f5a623',[['DMX In',A],['Power 32A',P]],[['Circ 1–6',P],['Circ 7–12',P],['DMX Thru',A]],litBadge)}
    ${node(800,120,300,'ATEM Constellation 8K','#a78bfa',[['SDI In 1',V],['SDI In 2',V],['SDI In 3',V],['SDI In 4',V]],[['PGM Out',V],['MV Out',V],['AUX 1',V]])}
    ${node(800,360,300,'Videohub 40×40','#c4b5fd',[['In 1–8',V],['In 9–16',V]],[['Out 1–8',V],['Monitor',V]])}
    ${node(490,560,260,'FOH — GrandMA / Pult','#818cf8',[['Ethernet',N]],[['DMX A',A],['DMX B',A]])}
    ${wire(330,150,800,160,V,'12G-SDI · 45 m',1)}
    ${wire(330,310,800,179,V,'12G-SDI · 45 m')}
    ${wire(330,329,800,400,V,'6G-SDI · 60 m')}

    ${wire(330,188,800,419,N,'Cat6A · 45 m')}
    <g transform="translate(430,88)"><rect width="240" height="30" rx="8" fill="#151a26" stroke="#2a3346"/><text x="14" y="19" fill="#a6b0c3" font-size="11">Kabel-Layer:</text>
      <circle cx="98" cy="15" r="4" fill="${V}"/><text x="106" y="19" fill="#a6b0c3" font-size="10">Video</text>

}

    <div class="linkbtn">${I.node.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Im Signal-Flow zeigen</div></div>
  <div class="sec xsec" style="--xc:var(--cam)"><h5>${I.cam.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Im Bild von</h5>
    <div class="frow" style="margin-bottom:2px"><span style="color:var(--text)">CAM 2 (85 mm) · CAM 3 (Tele)</span></div>
    <div style="font-size:10.5px;color:var(--muted)">Fixture liegt im FOV — Blendung prüfen</div></div>
  </div>`,

  <div class="props-head"><div class="kind">${I.cam.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Kamera · Venue</div>

    <div class="frow"><label>Pan / Tilt</label><input class="inp small" value="−90°"><input class="inp small" value="+2°"><span class="unit" style="margin-left:6px">Stativ 0,5–2,2 m</span></div></div>

    <div class="frow"><label>H-FOV</label><span class="val" style="width:auto;color:var(--text)">12.4°</span><label style="width:70px">Bildbreite</label><span style="color:var(--text)">1,89 m @ 8,7 m</span></div>
    <div class="frow"><label>DoF</label><span style="color:var(--text)">7,9 – 9,7 m</span><span style="color:var(--muted);font-size:11px">(1,8 m gesamt)</span></div>
    <div class="frow" style="margin-bottom:0"><label>Host im Bild</label><span style="color:var(--text)">72 % Höhe</span><span class="badge" style="background:#38bdf822;color:#7dd3fc">Vorschau öffnen</span></div></div>
  <div class="sec xsec" style="--xc:var(--sig)"><h5>${I.plug.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Verkabelung</h5>
    <div class="frow"><label>SDI Out 1</label><span style="color:var(--text)">→ ATEM In 2 · 12G · 45 m</span></div>
    <div class="frow"><label>Ethernet</label><span style="color:var(--text)">→ Switch FOH · Cat6A</span></div>
    <div class="linkbtn">${I.node.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Im Signal-Flow zeigen</div></div>
  <div class="sec xsec" style="--xc:var(--lit)"><h5>${I.bulb.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Licht am Motiv</h5>
    <div class="frow" style="margin-bottom:2px"><span style="color:var(--text)">Host: 812 lx · Key/Fill 2,8 : 1</span></div>
    <div style="font-size:10.5px;color:var(--muted)">aus Heatmap der Licht-Ebene</div></div>
  </div>`,
signal:`

    <div class="frow"><label>Nach</label><span style="color:var(--text)">ATEM Constellation · In 2</span></div>
    <div class="frow" style="margin-bottom:0"><span class="badge" style="background:#34d39918;color:#34d399">✓ Plan-Check ok</span><span class="badge" style="background:#a78bfa22;color:#c4b5fd">Patch-Sheet S. 2</span></div></div>
  <div class="sec xsec" style="--xc:var(--cam)"><h5>${I.cam.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Venue-Gerät</h5>

    <div class="frow" style="margin-bottom:2px"><label>Kabelweg</label><span style="color:var(--text)">≈ 41 m Luftlinie + Reserve</span></div>
    <div class="linkbtn">${I.home.replace('stroke-width="2"','stroke-width="2" width="11" height="11"')} Im 2D-Plan zeigen</div></div>
  <div class="sec"><h5>Beschaffung</h5>
    <div class="frow" style="margin-bottom:0"><span style="color:var(--text2)">BOM: 12G-SDI 50 m-Klasse</span><span class="badge" style="background:#f5a62322;color:#fbd38d">Rentman ✓</span></div></div>

const STATUS = {

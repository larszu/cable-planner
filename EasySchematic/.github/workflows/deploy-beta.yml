name: Deploy beta

# Every push to master auto-deploys the main app bundle to
# https://beta.easyschematic.live. Backend (API, D1, R2, devices, docs)
# is NOT touched here — that's deploy-prod.yml's job, triggered manually.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Deploy main app to beta
        run: npx wrangler deploy --env beta
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Silence the "Node.js 20 actions are deprecated" warnings GitHub started
# emitting in May 2026. The actions themselves still ship Node 20 runners,
# this opts in early to the upcoming Node 24 default. Drop this once we
# upgrade to action versions that bundle Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            build_args: --win
          - os: macos-latest
            name: macos
            build_args: --mac --x64 --arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No paid signing certificate available. The macOS config
          # requests an ad-hoc signature ("identity: '-'") so Apple
          # Silicon Gatekeeper accepts the binary instead of the
          # "Cable Planner is damaged and can't be opened" rejection.
          # We deliberately do NOT set CSC_IDENTITY_AUTO_DISCOVERY=false
          # because in some electron-builder versions that flag
          # short-circuits the explicit ad-hoc identity and the build
          # falls back to a fully-unsigned binary again.
        run: npx electron-builder ${{ matrix.build_args }} --publish never

      - name: List release/ contents
        # Make it obvious in the log when electron-builder produces no
        # artifacts (silent failure mode that bit us on Windows in v0.2.34).
        shell: bash
        run: ls -lh release/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cable-planner-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.blockmap
            release/latest*.yml
          # Fail the job loudly if no artifacts were produced. Previously
          # 'ignore' caused the Windows job to silently succeed with an
          # empty artifact, which then yielded a release with only the
          # macOS DMGs (issue surfaced in v0.2.34).
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

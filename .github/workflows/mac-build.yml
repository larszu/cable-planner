name: macOS Build

# Cross-building macOS from Windows is not supported by electron-builder.
# This workflow runs on a macOS GitHub-hosted runner and produces unsigned
# DMGs for Intel (x64) and Apple Silicon (arm64) whenever a version tag
# is pushed. The resulting DMGs are attached to the matching GitHub
# Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

# Match release.yml — keep the FORCE flag until upload-artifact and
# action-gh-release publish Node-24 versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          # Node 24 LTS (active LTS since October 2025). Keeps mac-build
          # aligned with release.yml.
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer/main/preload
        run: npm run build

      - name: Build macOS DMGs (x64 + arm64)
        # No paid Apple signing credentials. The mac config asks for an
        # ad-hoc signature ("identity: '-'") so Gatekeeper does not
        # reject the binary with "is damaged" on Apple Silicon. Users
        # still see the standard "unidentified developer" prompt and
        # need to right-click → Open the first time.
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never

      - name: List artifacts
        run: ls -lh release/*.dmg || true

      - name: Upload DMGs to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          fail_on_unmatched_files: false
